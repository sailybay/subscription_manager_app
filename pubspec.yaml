name: subscription_manager_app
description: "Subscription Manager — personal finance assistant for tracking recurring payments."
publish_to: 'none'

# Versioning: major.minor.patch+build
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Icons ---
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1         # Premium typography (Inter font)

  # --- State Management ---
  flutter_riverpod: ^2.6.1     # Reactive state management
  riverpod_annotation: ^2.3.5  # Code generation annotations for Riverpod

  # --- Navigation ---
  go_router: ^14.8.1           # Declarative routing

  # --- Local Storage (Offline-first) ---
  hive_flutter: ^1.1.0         # Hive with Flutter integration
  hive: ^2.2.3                 # Lightweight NoSQL database

  # --- Charts / Analytics ---
  fl_chart: ^0.71.0            # Pie charts & line charts for analytics

  # --- Utilities ---
  uuid: ^4.5.1                 # UUID generation for entity IDs
  intl: ^0.19.0                # Internationalization & date formatting
  equatable: ^2.0.7            # Value equality for entities
  shared_preferences: ^2.3.5   # Auth session persistence
  crypto: ^3.0.6               # SHA-256 password hashing

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0        # Recommended lint rules
  build_runner: ^2.4.15        # Code generation runner
  hive_generator: ^2.0.1       # Hive TypeAdapter generator
  riverpod_generator: ^2.4.4   # Riverpod provider generator

flutter:
  uses-material-design: true
  # Google Fonts are loaded from the network/cache, no local font config needed.
